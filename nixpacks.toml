[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.bcmath",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.openssl",
  "php82Extensions.tokenizer",
  "php82Extensions.intl",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --force && php -S 0.0.0.0:$PORT -t public"
